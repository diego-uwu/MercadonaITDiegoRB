openapi: 3.0.3

info:
  title: Mercadona IT API
  version: 1.0.0
  description: Aplicación para la gestión de tiendas, secciones, trabajadores y sus asignaciones.

paths:
  /tienda:
    post:
      operationId: insertTienda
      summary: Crea una tienda
      description: Crea una tienda y la asocia automáticamente con todas las secciones existentes
      tags:
        - Tienda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TiendaDto'
      responses:
        '201':
          description: Tienda creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TiendaDto'
        '400':
          description: Datos de la tienda no válidos
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Ya existe una tienda con el código indicado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /tienda/{tiendaId}:
    parameters:
      - name: tiendaId
        in: path
        required: true
        description: Código de la tienda
        schema:
          type: integer
          format: int64
          minimum: 1
        example: 1
    delete:
      operationId: deleteTienda
      summary: Elimina una tienda
      description: Elimina la tienda y sus asociaciones con secciones, siempre que no tenga trabajadores
      tags:
        - Tienda
      responses:
        '204':
          description: Tienda eliminada
        '404':
          description: Tienda no encontrada
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: La tienda no se puede eliminar porque tiene trabajadores
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /trabajador/{DNI}:
    parameters:
      - name: DNI
        in: path
        required: true
        description: DNI del trabajador
        schema:
          type: string
          maxLength: 9
        example: 11111111A
    get:
      operationId: getTrabajador
      summary: Obtiene un trabajador por su DNI
      description: Recupera los datos de un trabajador a partir de su DNI
      tags:
        - Trabajador
      responses:
        '200':
          description: Trabajador encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrabajadorDto'
        '404':
          description: Trabajador no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    delete:
      operationId: deleteTrabajador
      summary: Elimina un trabajador por su DNI
      description: Elimina los datos de un trabajador a partir de su DNI
      tags:
        - Trabajador
      responses:
        '204':
          description: Trabajador eliminado
        '404':
          description: Trabajador no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /trabajador:
    put:
      operationId: updateTrabajador
      summary: Actualiza un trabajador
      description: Actualiza todos los datos del trabajador identificado por el DNI incluido en el cuerpo
      tags:
        - Trabajador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrabajadorDto'
      responses:
        '200':
          description: Trabajador actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrabajadorDto'
        '400':
          description: Datos del trabajador no válidos
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Trabajador no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: La actualización entra en conflicto con los datos existentes
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    post:
      operationId: insertTrabajador
      summary: Crea un trabajador
      description: Registra un nuevo trabajador en una tienda
      tags:
        - Trabajador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrabajadorDto'
      responses:
        '201':
          description: Trabajador creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrabajadorDto'
        '400':
          description: Datos del trabajador no válidos
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Ya existe un trabajador con el DNI indicado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /trabajador/{DNI}/aptitudes/{aptitud}:
    parameters:
      - name: DNI
        in: path
        required: true
        description: DNI del trabajador
        schema:
          type: string
          maxLength: 9
        example: 11111111A
      - name: aptitud
        in: path
        required: true
        description: Nombre de una aptitud existente
        schema:
          type: string
          maxLength: 100
        example: Hornear Pan
    post:
      operationId: addAptitudToTrabajador
      summary: Asigna una aptitud a un trabajador
      description: Asigna al trabajador una aptitud previamente registrada en el sistema
      tags:
        - Aptitudes
      responses:
        '201':
          description: Aptitud asignada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AptitudTrabajadorDto'
        '404':
          description: Trabajador o aptitud no encontrados
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: El trabajador ya tiene asignada la aptitud
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    delete:
      operationId: deleteAptitudFromTrabajador
      summary: Elimina una aptitud de un trabajador
      description: Elimina la asignación de una aptitud al trabajador indicado
      tags:
        - Aptitudes
      responses:
        '204':
          description: Aptitud eliminada correctamente
        '404':
          description: Trabajador, aptitud o asignación no encontrados
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /turno:
    put:
      operationId: upsertTurno
      summary: Crea o actualiza un turno
      description: Crea o actualiza un turno con el DNI y la sección indicados en el cuerpo de la petición
      tags:
        - Turnos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnoDto'
      responses:
        '201':
          description: Turno creado o actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnoDto'
        '409':
          description: Este turno excede el máximo de horas disponibles para el trabajador
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /turno/{DNI}:
    parameters:
      - name: DNI
        in: path
        required: true
        description: DNI del trabajador
        schema:
          type: string
          maxLength: 9
        example: 11111111A
    get:
      operationId: getTurnosByTrabajador
      summary: Obtiene los turnos de un trabajador
      description: Recupera todos los turnos asignados al trabajador indicado
      tags:
        - Turnos
      responses:
        '200':
          description: Lista de turnos del trabajador
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TurnoDto'
        '404':
          description: Trabajador no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /turno/{DNI}/{seccion}:
    parameters:
      - name: DNI
        in: path
        required: true
        description: DNI del trabajador
        example: 11111111A
        schema:
          type: string
      - name: seccion
        in: path
        required: true
        description: Sección de la tienda
        example: Pescaderia
        schema:
          type: string
    delete:
      summary: Elimina un turno de un empleado
      description: Elimina un turno de un empleado dado el DNI del empleado y la sección de la tienda en la que trabaja
      tags:
        - Turnos
      responses:
        '204':
          description: Turno eliminado correctamente
        '404':
          description: Turno no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /documento/estado/{tiendaId}:
    parameters:
      - name: tiendaId
        in: path
        required: true
        description: ID de la tienda
        example: 1
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getEstadoTiendaReport
      summary: Estado de una tienda
      description: Recupera un PDF que muestra las secciones de una tienda y los empleados asignados a cada una
      tags:
        - Documentos
      responses:
        '200':
          description: PDF generado correctamente
          headers:
            Content-Disposition:
              description: Nombre sugerido para el archivo PDF
              schema:
                type: string
                example: attachment; filename="estado-tienda-1.pdf"
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          description: Tienda no encontrada
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /documento/secciones-incompletas/{tiendaId}:
    parameters:
      - name: tiendaId
        in: path
        required: true
        description: ID de la tienda
        example: 1
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getSeccionesIncompletasReport
      summary: Secciones incompletas de una tienda
      description: Recupera un PDF que muestra las secciones de una tienda que no tienen cubiertas las horas mínimas requeridas para su correcto desempeño
      tags:
        - Documentos
      responses:
        '200':
          description: PDF generado correctamente
          headers:
            Content-Disposition:
              description: Nombre sugerido para el archivo PDF
              schema:
                type: string
                example: attachment; filename="secciones-incompletas-tienda-1.pdf"
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          description: Tienda no encontrada
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
components:
  schemas:
    ProblemDetail:
      type: object
      required:
        - title
        - status
        - detail
      properties:
        type:
          type: string
          format: uri
          example: about:blank
        title:
          type: string
          example: Resource not found
        status:
          type: integer
          format: int32
          example: 404
        detail:
          type: string
          example: Trabajador with identifier 11111111A was not found
        instance:
          type: string
          format: uri
          example: /trabajador/11111111A

    TiendaSeccionDto:
      type: object
      additionalProperties: false
      description: Asociación entre una tienda y una sección
      required:
        - tienda
        - seccion
      properties:
        tienda:
          type: integer
          format: int64
          description: Código de la tienda
          example: 1
        seccion:
          type: string
          maxLength: 50
          description: Nombre de la sección
          example: Pescaderia

    TiendaDto:
      type: object
      additionalProperties: false
      description: Tienda de la cadena
      required:
        - codigo
        - nombre
      properties:
        codigo:
          type: integer
          format: int64
          minimum: 1
          description: Código de la tienda
          example: 4
        nombre:
          type: string
          minLength: 1
          maxLength: 100
          description: Nombre de la tienda
          example: Tienda 4

    AptitudTrabajadorDto:
      type: object
      additionalProperties: false
      description: Aptitud asignada a un trabajador
      required:
        - dniTrabajador
        - aptitud
      properties:
        dniTrabajador:
          type: string
          maxLength: 9
          description: DNI del trabajador
          example: 11111111A
        aptitud:
          type: string
          maxLength: 100
          description: Nombre de la aptitud asignada
          example: Hornear Pan

    TrabajadorDto:
      type: object
      additionalProperties: false
      required:
        - dni
        - nombre
        - apellidos
        - tienda
        - horasDisponibles
      properties:
        dni:
          type: string
          maxLength: 9
          description: DNI del trabajador
          example: 11111111A
        nombre:
          type: string
          maxLength: 100
          description: Nombre del trabajador
          example: Diego
        apellidos:
          type: string
          maxLength: 150
          description: Apellidos del trabajador
          example: Rodríguez Barrera
        tienda:
          type: integer
          format: int64
          description: Código de la tienda en la que trabaja el trabajador
          example: 1
        horasDisponibles:
          type: integer
          minimum: 0
          maximum: 8
          description: Horas diarias de trabajo disponibles
          example: 8

    TurnoDto:
      type: object
      additionalProperties: false
      required:
        - dniTrabajador
        - seccion
        - horas
      properties:
        dniTrabajador:
          type: string
          maxLength: 9
          description: DNI del trabajador
          example: 11111111A
        tienda:
          type: integer
          format: int64
          description: Código de la tienda en la que trabaja el trabajador
          example: 1
        seccion:
          type: string
          maxLength: 50
          description: Nombre de la sección
          example: Pescaderia
        horas:
          type: integer
          minimum: 1
          maximum: 8
          description: Horas diarias asignadas al trabajador en esta sección
          example: 8
