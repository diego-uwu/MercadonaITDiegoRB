openapi: 3.0.3

info:
  title: Mercadona IT API
  version: 1.0.0
  description: Aplicación para la gestión de tiendas, secciones, trabajadores y sus asignaciones.

paths:
  /trabajador/{DNI}:
    parameters:
      - name: DNI
        in: path
        required: true
        description: DNI del trabajador
        schema:
          type: string
          maxLength: 9
        example: 12345678Z
    get:
      summary: Obtiene un trabajador por su DNI
      description: Recupera los datos de un trabajador a partir de su DNI
      tags:
        - Trabajador
      responses:
        '200':
          description: Trabajador encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrabajadorDto'
        '404':
          description: Trabajador no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    put:
      summary: Actualiza un trabajador por su DNI
      description: Actualiza todos los datos del trabajador. El DNI del cuerpo debe coincidir con el indicado en la ruta.
      tags:
        - Trabajador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrabajadorDto'
      responses:
        '200':
          description: Trabajador actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrabajadorDto'
        '400':
          description: Datos no válidos o el DNI del cuerpo no coincide con el de la ruta
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Trabajador no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: La actualización entra en conflicto con los datos existentes
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    delete:
      summary: Elimina un trabajador por su DNI
      description: Elimina los datos de un trabajador a partir de su DNI
      tags:
        - Trabajador
      responses:
        '204':
          description: Trabajador eliminado
        '404':
          description: Trabajador no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /trabajador:
    post:
      summary: Crea un trabajador
      description: Registra un nuevo trabajador en una tienda
      tags:
        - Trabajador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrabajadorDto'
      responses:
        '201':
          description: Trabajador creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrabajadorDto'
        '400':
          description: Datos del trabajador no válidos
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Ya existe un trabajador con el DNI indicado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /turno:
    put:
      operationId: upsertTurno
      summary: Crea o actualiza un turno
      description: Crea o actualiza un turno con el DNI y la sección indicados en el cuerpo de la petición
      tags:
        - Turnos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnoDto'
      responses:
        '201':
          description: Turno creado o actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnoDto'
        '409':
          description: Este turno excede el máximo de horas disponibles para el trabajador
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /turno/{DNI}:
    get:
      operationId: getTurnosByTrabajador
      summary: Obtiene los turnos de un trabajador
      description: Recupera todos los turnos asignados al trabajador indicado
      tags:
        - Turnos
      parameters:
        - name: DNI
          in: path
          required: true
          description: DNI del trabajador
          schema:
            type: string
            maxLength: 9
          example: 12345678A
      responses:
        '200':
          description: Lista de turnos del trabajador
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TurnoDto'
        '404':
          description: Trabajador no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /turno/{DNI}/{seccion}:
    parameters:
      - name: DNI
        in: path
        required: true
        description: DNI del trabajador
        example: 12345678A
        schema:
          type: string
      - name: seccion
        in: path
        required: true
        description: Sección de la tienda
        example: Pescaderia
        schema:
          type: string
    delete:
      summary: Elimina un turno de un empleado
      description: Elimina un turno de un empleado dado el DNI del empleado y la sección de la tienda en la que trabaja
      tags:
        - Turnos
      responses:
        '204':
          description: Turno eliminado correctamente
        '404':
          description: Turno no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
components:
  schemas:
    ProblemDetail:
      type: object
      required:
        - title
        - status
        - detail
      properties:
        type:
          type: string
          format: uri
          example: about:blank
        title:
          type: string
          example: Resource not found
        status:
          type: integer
          format: int32
          example: 404
        detail:
          type: string
          example: Trabajador with identifier 12345678A was not found
        instance:
          type: string
          format: uri
          example: /trabajador/12345678A

    TiendaSeccionDto:
      type: object
      additionalProperties: false
      description: Asociación entre una tienda y una sección
      required:
        - tienda
        - seccion
      properties:
        tienda:
          type: integer
          format: int64
          description: Código de la tienda
          example: 1
        seccion:
          type: string
          maxLength: 50
          description: Nombre de la sección
          example: Pescaderia

    TrabajadorDto:
      type: object
      additionalProperties: false
      required:
        - dni
        - nombre
        - apellidos
        - tienda
        - horasDisponibles
      properties:
        dni:
          type: string
          maxLength: 9
          description: DNI del trabajador
          example: 12345678A
        nombre:
          type: string
          maxLength: 100
          description: Nombre del trabajador
          example: Diego
        apellidos:
          type: string
          maxLength: 150
          description: Apellidos del trabajador
          example: Rodríguez Barrera
        tienda:
          type: integer
          format: int64
          description: Código de la tienda en la que trabaja el trabajador
          example: 1
        horasDisponibles:
          type: integer
          minimum: 0
          maximum: 8
          description: Horas diarias de trabajo disponibles
          example: 8

    TurnoDto:
      type: object
      additionalProperties: false
      required:
        - dniTrabajador
        - seccion
        - horas
      properties:
        dniTrabajador:
          type: string
          maxLength: 9
          description: DNI del trabajador
          example: 12345678A
        tienda:
          type: integer
          format: int64
          description: Código de la tienda en la que trabaja el trabajador
          example: 1
        seccion:
          type: string
          maxLength: 50
          description: Nombre de la sección
          example: Pescaderia
        horas:
          type: integer
          minimum: 1
          maximum: 8
          description: Horas diarias asignadas al trabajador en esta sección
          example: 8
