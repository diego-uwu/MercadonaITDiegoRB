openapi: 3.0.3

info:
  title: Mercadona IT API
  version: 1.0.0
  description: Aplicación para la gestión de tiendas, secciones, trabajadores y sus asignaciones.

paths:
  /trabajador/{DNI}:
    parameters:
      - name: DNI
        in: path
        required: true
        description: DNI del trabajador
        schema:
          type: string
          maxLength: 9
        example: 12345678Z
    get:
      summary: Obtiene un trabajador por su DNI
      description: Recupera los datos de un trabajador a partir de su DNI
      tags:
        - Trabajador
      responses:
        '200':
          description: Trabajador encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrabajadorDto'
        '404':
          description: Trabajador no encontrado
    put:
      summary: Actualiza un trabajador por su DNI
      description: Actualiza todos los datos del trabajador. El DNI del cuerpo debe coincidir con el indicado en la ruta.
      tags:
        - Trabajador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrabajadorDto'
      responses:
        '200':
          description: Trabajador actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrabajadorDto'
        '400':
          description: Datos no válidos o el DNI del cuerpo no coincide con el de la ruta
        '404':
          description: Trabajador no encontrado
        '409':
          description: La actualización entra en conflicto con los datos existentes
    delete:
      summary: Elimina un trabajador por su DNI
      description: Elimina los datos de un trabajador a partir de su DNI
      tags:
        - Trabajador
      responses:
        '204':
          description: Trabajador eliminado
        '404':
          description: Trabajador no encontrado
  /trabajador:
    post:
      summary: Crea un trabajador
      description: Registra un nuevo trabajador en una tienda
      tags:
        - Trabajador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrabajadorDto'
      responses:
        '201':
          description: Trabajador creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrabajadorDto'
        '400':
          description: Datos del trabajador no válidos
        '409':
          description: Ya existe un trabajador con el DNI indicado

components:
  schemas:
    TiendaDto:
      type: object
      additionalProperties: false
      required:
        - codigo
        - nombre
      properties:
        codigo:
          type: integer
          format: int64
          description: Código de la tienda
          example: 1234
        nombre:
          type: string
          maxLength: 100
          description: Nombre de la tienda
          example: Valencia Centro

    SeccionDto:
      type: object
      additionalProperties: false
      required:
        - nombre
        - horasNecesarias
      properties:
        nombre:
          type: string
          maxLength: 50
          description: Nombre de la sección
          example: Pescaderia
        horasNecesarias:
          type: integer
          minimum: 1
          maximum: 24
          description: Horas diarias necesarias para cubrir la sección
          example: 16

    TiendaSeccionDto:
      type: object
      additionalProperties: false
      description: Asociación entre una tienda y una sección
      required:
        - tienda
        - seccion
      properties:
        tienda:
          type: integer
          format: int64
          description: Código de la tienda
          example: 1001
        seccion:
          type: string
          maxLength: 50
          description: Nombre de la sección
          example: Pescaderia

    TrabajadorDto:
      type: object
      additionalProperties: false
      required:
        - dni
        - nombre
        - apellidos
        - tienda
        - horasDisponibles
      properties:
        dni:
          type: string
          maxLength: 9
          description: DNI del trabajador
          example: 12345678Z
        nombre:
          type: string
          maxLength: 100
          description: Nombre del trabajador
          example: Diego
        apellidos:
          type: string
          maxLength: 150
          description: Apellidos del trabajador
          example: Rodríguez Barrera
        tienda:
          type: integer
          format: int64
          description: Código de la tienda en la que trabaja el trabajador
          example: 1001
        horasDisponibles:
          type: integer
          minimum: 0
          maximum: 8
          description: Horas diarias de trabajo disponibles
          example: 8

    TrabajadorSeccionDto:
      type: object
      additionalProperties: false
      description: Asignación de un trabajador a una sección en su tienda
      required:
        - trabajador
        - tienda
        - seccion
        - horasAsignadas
      properties:
        trabajador:
          type: string
          maxLength: 9
          description: DNI del trabajador
          example: 12345678Z
        tienda:
          type: integer
          format: int64
          description: Código de la tienda en la que trabaja el trabajador
          example: 1001
        seccion:
          type: string
          maxLength: 50
          description: Nombre de la sección
          example: Horno
        horasAsignadas:
          type: integer
          minimum: 1
          maximum: 8
          description: Horas diarias asignadas al trabajador en esta sección
          example: 2
